<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryunan Hub 🔴⚫</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Mitr:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* 🌌 พื้นหลังจักรวาล แก้ไขให้แสดงผลได้ทุกหน้าจอ */
        body { 
            background-color: #050002;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(60, 0, 15, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(90, 0, 20, 0.6) 0%, transparent 50%);
            font-family: 'Mitr', sans-serif; 
            color: #ffffff; 
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* ✨ กล่องเฉพาะสำหรับดวงดาวระยิบระยับ */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle, #ff0055 1.5px, transparent 1.5px),
                radial-gradient(circle, #ffffff 1px, transparent 1px);
            background-size: 90px 90px, 130px 130px;
            background-position: 0 0, 45px 45px;
            animation: sparkle 3s infinite alternate;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% { opacity: 0.1; }
            100% { opacity: 0.5; transform: scale(1.02); }
        }

        .container { 
            background: rgba(15, 15, 15, 0.85); 
            max-width: 500px; 
            width: 100%;
            border-radius: 24px; 
            padding: 30px; 
            border: 2px solid #ff0055; 
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5), inset 0 0 15px rgba(255, 0, 85, 0.3);
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        h1 { 
            font-family: 'Orbitron', sans-serif;
            color: #ff0055; 
            text-align: center; 
            text-shadow: 0 0 15px #ff0055;
        }

        .image-box {
            text-align: center;
            background: rgba(30, 30, 30, 0.6);
            padding: 15px;
            border-radius: 18px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 0, 85, 0.2);
        }

        .profile-img {
            max-width: 100%; 
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
        }

        .neon-btn {
            display: block;
            width: 100%;
            padding: 16px;
            background: transparent;
            color: #ff0055;
            border: 2px solid #ff0055;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px #ff0055;
            transition: all 0.3s ease;
            margin-bottom: 30px;
            font-family: 'Mitr', sans-serif;
        }

        .neon-btn:hover {
            background: #ff0055;
            color: #ffffff;
            box-shadow: 0 0 30px #ff0055;
        }

        .contact-group { display: flex; flex-direction: column; gap: 12px; }
        .contact-title { color: #b3b3b3; font-size: 14px; text-align: center; margin-bottom: 5px; }
        .link-btn {
            display: block; text-align: center; padding: 14px;
            background: rgba(38, 38, 38, 0.7); color: #fff; text-decoration: none;
            border-radius: 10px; border: 1px solid rgba(255, 0, 85, 0.3); transition: 0.3s;
        }
        .link-btn:hover { border-color: #ff0055; background: rgba(255, 0, 85, 0.1); }

        /* 🔴 ระบบหน้าจอ Modal (ป็อปอัปข้อความ) */
        .modal {
            display: none; /* ซ่อนไว้ก่อน จะโชว์เมื่อกดปุ่ม */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); /* สีพื้นหลังตอนป็อปอัปเด้ง */
            backdrop-filter: blur(5px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .modal-content {
            background: #0d0d0d;
            border: 2px solid #ff0055;
            box-shadow: 0 0 30px #ff0055;
            padding: 30px;
            border-radius: 20px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
        }

        .modal-content p {
            color: #ff99bb;
            line-height: 1.6;
        }

        /* ปุ่มกากบาทสำหรับปิด */
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            color: #ff0055;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { color: #ffffff; text-shadow: 0 0 10px #ff0055; }
    </style>
</head>
<body>

<!-- เลเยอร์พื้นหลังดวงดาว -->
<div class="stars"></div>

<div class="container">
    <h1>RYUNAN HUB</h1>

    <div class="image-box">
        <img src="https://i.ibb.co/7dSHpGFw/image.jpg" alt="รยูนัน" class="profile-img">
    </div>

    <!-- เปลี่ยนจาก alert เป็นการเรียกใช้ฟังก์ชันโชว์ Modal -->
    <button class="neon-btn" onclick="openModal()">🔴 แนะนำตัวละคร (หลังบ้าน)</button>

    <div class="contact-group">
        <div class="contact-title">ช่องทางการติดต่อ & แพลตฟอร์มบอท</div>
        <a href="https://instagram.com/zwexur._" target="_blank" class="link-btn">📸 Instagram (zwexur._)</a>
        <a href="https://www.tiktok.com/@xx._owez?_r=1&_t=ZS-97pgfMoSi6k" target="_blank" class="link-btn">🎵 TikTok</a>
        <a href="https://loveydovey.onelink.me/vs4G/ewygf3ml" target="_blank" class="link-btn">💕 LoveyDovey</a>
    </div>
</div>

<!-- 🔴 โครงสร้าง HTML ของ Modal ข้อความหลังบ้าน -->
<div id="introModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 style="color: #ff0055; font-family: 'Orbitron', sans-serif;">BACKSTAGE</h2>
        <p>สวัสดีครับผมชื่อ รยูนัน ที่เป็นเจ้าของแท็กบ้าน #ลูกพ่อยูสุดเข้ครับ และยินดีที่ได้รู้จักครับ สามารถมาทำความรู้จัก และแจ้งปัญหาให้ผมทราบได้ทางช่องการติดต่อ IG: zwexur._</p>
    </div>
</div>

<script>
    // คำสั่ง JavaScript สำหรับเปิด-ปิด Modal
    function openModal() {
        document.getElementById("introModal").style.display = "flex";
    }
    
    function closeModal() {
        document.getElementById("introModal").style.display = "none";
    }
</script>

</body>
</html>
